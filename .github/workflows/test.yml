name: validate-skill

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --disable-pip-version-check -r requirements-dev.txt
      - run: python -m pytest -q
      - run: python scripts/xbloom.py doctor
      - run: python scripts/xbloom.py validate assets/hot-template.yaml
      - run: python scripts/xbloom.py validate assets/flash-brew-template.yaml
