name: Example Bright Flash Brew
# Local serving metadata only: Studio has no separate iced/flash program.
kind: flash-brew
dripper: Omni Dripper 2
dose_g: 15
grind: 52
ratio: 10
water_ml: 240
hot_water_ml: 150
# Weigh this into the receiving vessel before start; the machine never dispenses ice.
ice_g: 90
time: "2:00-2:40"
note: Run the normal coffee pour-over program over 90 g clean ice preloaded before start.
pours:
  - label: Bloom
    ml: 40
    temp_c: 94
    pattern: spiral
    vibration: after
    pause_s: 35
    rpm: 100
    flow_ml_s: 3.0
  - label: Main
    ml: 60
    temp_c: 93
    pattern: spiral
    vibration: none
    pause_s: 8
    rpm: 100
    flow_ml_s: 3.2
  - label: Finish
    ml: 50
    temp_c: 92
    pattern: circular
    vibration: none
    pause_s: 0
    rpm: 100
    flow_ml_s: 3.2
